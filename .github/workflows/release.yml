name: Release binaries

# Build penfreely-bridge for each OS and attach the binaries to the GitHub
# Release, so users can download and run it without Docker. Triggered by
# pushing a version tag (e.g. v0.1.0), or manually.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            archive: tar.gz
          # Cross-compiled from the Apple Silicon runner (the Intel macos-13
          # runners are scarce and queue for a long time); the Apple toolchain
          # targets x86_64 natively and native-tls uses Secure Transport.
          - os: macos-14
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          NAME="penfreely-bridge-${{ matrix.target }}"
          tar -C "target/${{ matrix.target }}/release" -czf "$NAME.tar.gz" penfreely-bridge
          echo "ASSET=$NAME.tar.gz" >> "$GITHUB_ENV"

      - name: Package (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "penfreely-bridge-${{ matrix.target }}"
          Compress-Archive -Path "target/${{ matrix.target }}/release/penfreely-bridge.exe" -DestinationPath "$name.zip"
          "ASSET=$name.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Upload to the release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
          fail_on_unmatched_files: true
